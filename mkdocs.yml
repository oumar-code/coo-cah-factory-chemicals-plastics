site_name: Coo-Cah Plastics & Polymers Factory
site_description: >
  Tier 1 Critical Infrastructure — blueprint, operational docs, and AI-integration specifications
  for the Coo-Cah Plastics & Polymers Factory (Agbara/Sagamu, Nigeria).
site_author: Coo-Cah Technologies Holdings
site_url: https://oumar-code.github.io/coo-cah-factory-chemicals-plastics/

repo_name: oumar-code/coo-cah-factory-chemicals-plastics
repo_url: https://github.com/oumar-code/coo-cah-factory-chemicals-plastics
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mermaid2:
      javascript: javascripts/mermaid.esm.min.mjs

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Master Repo Reference: master-repo-ref.md
  - Implementation Plan: implementation-plan.md
  - Factory Docs:
      - Machinery & Equipment: machinery.md
      - Energy Profile: energy-profile.md
      - Floor Plan & Site Layout: floor-plan.md
      - Automation Roadmap: automation-roadmap.md
      - Supply Chain: supply-chain.md
      - Intragroup Supply Coordination: intragroup-supply-coordination.md
      - Regulatory & Compliance: regulatory.md
      - CapEx / OpEx Model: capex-opex.md
      - Digital Twin: digital-twin.md
      - Sensor Registry: sensor-map.md
      - MES Integration: mes-integration.md
      - BIM:
          - Overview: bim/README.md
          - Asset Anchors: bim/asset-anchors.md
          - Zone Boundaries: bim/zone-boundaries.md
  - Gate & Implementation Readiness:
      - Gap Closure Report: gap-closure-report.md
      - AI Platform Status: ai-platform-status.md
      - Penetration Test Scoping: pentest-scoping.md
      - Simulation Readiness: simulation-readiness.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/oumar-code/Coo-Kah-Doks
      name: Master Repository — Coo-Kah-Doks
  analytics:
    provider: google
    property: ""

extra_css:
  - stylesheets/extra.css

copyright: >
  Copyright &copy; 2025 Coo-Cah Technologies Holdings —
  <a href="https://github.com/oumar-code/Coo-Kah-Doks">Coo-Kah-Doks Master Repo</a>
