site_name: Coo-Cah Plastics & Polymers Factory
site_description: >
  Blueprint, operational docs & AI-integration specifications for the Coo-Cah Plastics & Polymers
  Factory (Agbara/Sagamu, Nigeria). Tier 1 Critical Infrastructure — Coo-Cah Technologies Holdings.
site_author: Coo-Cah Technologies Holdings
site_url: https://oumar-code.github.io/coo-cah-factory-chemicals-plastics/

repo_name: oumar-code/coo-cah-factory-chemicals-plastics
repo_url: https://github.com/oumar-code/coo-cah-factory-chemicals-plastics
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mermaid2

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Master Repo Reference: master-repo-ref.md
  - Factory Documents:
      - Machinery & Equipment: machinery.md
      - Energy Profile: energy-profile.md
      - Floor Plan & Site Layout: floor-plan.md
      - Automation Roadmap: automation-roadmap.md
      - Supply Chain: supply-chain.md
      - Regulatory & Compliance: regulatory.md
      - CapEx / OpEx Model: capex-opex.md
      - Digital Twin: digital-twin.md
      - MES Integration: mes-integration.md
      - BIM:
          - Overview: bim/README.md
          - Asset Anchors: bim/asset-anchors.md
          - Zone Boundaries: bim/zone-boundaries.md
  - Gate & Implementation Readiness:
      - Gap Closure Report: gap-closure-report.md
      - Gate 3 Readiness Sprint: gate3-readiness-sprint.md
      - Pentest Kickoff Pack: pentest-kickoff-pack.md
      - AI Platform Status: ai-platform-status.md
      - Penetration Test Scoping: pentest-scoping.md
      - BIM & Sensor Traceability Matrix: bim-sensor-traceability-matrix.md
      - Commissioning Data Acceptance Checklist: commissioning-data-acceptance-checklist.md
      - Simulation Sign-Off Baseline: simulation-signoff-baseline.md
      - Simulation Readiness: simulation-readiness.md
      - Gate 3 Evidence Dashboard: gate3-evidence-dashboard.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/oumar-code/Coo-Kah-Doks
      name: Master Repository — Coo-Kah-Doks

copyright: >
  Copyright &copy; 2025 Coo-Cah Technologies Holdings —
  <a href="https://github.com/oumar-code/Coo-Kah-Doks">Coo-Kah-Doks Master Repo</a>
